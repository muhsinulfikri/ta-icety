
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ta-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - ta-network

  nginx:
    image: nginx:latest
    container_name: ta-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ta-network

  mysql:
    image: mysql:8.0
    container_name: ta-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dev_icety
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ta-network

  redis:
    image: redis:7
    container_name: ta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ta-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ta-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - ta-network

volumes:
  mysql-data:

networks:
  ta-network:
